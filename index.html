<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DeepSeek AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            min-height: 100vh;
            padding: 16px;
            position: relative;
            transition: background 0.3s ease;
        }

        /* 默认渐变背景 */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 自定义背景图时的样式 */
        body.custom-bg {
            animation: none;
            background-size: cover !important;
            background-position: center !important;
            background-attachment: fixed !important;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            height: calc(100vh - 32px);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        /* ========== 侧边栏菜单 ========== */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 998;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .menu-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -85%;
            width: 85%;
            max-width: 320px;
            height: 100%;
            background: rgba(30,30,40,0.95);
            backdrop-filter: blur(20px);
            z-index: 999;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 20px rgba(0,0,0,0.3);
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            color: white;
            font-size: 1.2rem;
        }

        .close-sidebar {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: white;
            padding: 0;
        }

        .new-convo-btn {
            margin: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .conversation-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px;
        }

        .convo-item {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .convo-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .convo-item .convo-title {
            color: white;
            font-size: 0.85rem;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .convo-item .delete-convo {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            color: #ff6b6b;
        }

        /* 菜单按钮 */
        .menu-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            color: white;
        }

        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .header-left {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        /* 卡片 */
        .card {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.25);
        }

        /* 背景自定义区域 */
        .bg-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
        }

        .bg-btn {
            background: rgba(255,255,255,0.2);
            font-size: 12px;
            padding: 6px 12px;
        }

        .api-config {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }

        .api-config input {
            flex: 2;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 18px;
            border-radius: 40px;
            font-size: 14px;
            color: white;
            outline: none;
        }

        .api-config input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        button {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
        }

        .toolbar-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        /* 聊天区域 */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 8px 4px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-box::-webkit-scrollbar {
            width: 5px;
        }

        .chat-box::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.4);
            border-radius: 10px;
        }

        .message {
            display: flex;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            justify-content: flex-end;
        }

        .assistant-message {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 24px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            backdrop-filter: blur(20px);
        }

        .user-message .bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 15px rgba(102,126,234,0.3);
        }

        .assistant-message .bubble {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-bottom-left-radius: 6px;
        }

        /* 底部区域 */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-area {
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border-radius: 44px;
            padding: 6px 6px 6px 20px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .input-area input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            font-size: 16px;
            color: white;
            outline: none;
        }

        .input-area input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .status {
            text-align: center;
            font-size: 11px;
            margin-top: 8px;
            color: rgba(255,255,255,0.7);
        }

        .cost {
            text-align: right;
            font-size: 10px;
            margin-top: 4px;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

<!-- 侧边栏遮罩 -->
<div class="menu-overlay" id="menuOverlay"></div>

<!-- 侧边栏菜单 -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3>📋 历史对话</h3>
        <button class="close-sidebar" id="closeSidebar">✕</button>
    </div>
    <button class="new-convo-btn" id="newConvoSidebar">➕ 新建对话</button>
    <div class="conversation-list" id="conversationList"></div>
</div>

<div class="container">
    <div class="header">
        <div class="header-left">
            <button class="menu-btn" id="openSidebar">☰</button>
            <h1>DeepSeek AI</h1>
        </div>
        <div style="display: flex; gap: 8px;">
            <button class="menu-btn" id="themeToggle">🌙</button>
        </div>
    </div>

    <div class="card">
        <div class="api-config">
            <input type="password" id="apiKey" placeholder="🔑 DeepSeek API Key" autocomplete="off">
            <button id="saveKeyBtn" class="btn-primary">💾 保存密钥</button>
            <button id="clearChatBtn">🗑️ 清空</button>
        </div>
        <div class="toolbar-group">
            <button id="exportChatBtn">📤 导出对话</button>
            <button id="importChatBtn">📥 导入对话</button>
            <button id="loadHistoryBtn">📂 加载上次</button>
        </div>
        <!-- 背景自定义区域 -->
        <div class="bg-controls">
            <span style="font-size:12px; opacity:0.8;">🎨 背景：</span>
            <button class="bg-btn" id="bgGradient">🌈 渐变</button>
            <button class="bg-btn" id="bgUpload">🖼️ 上传图片</button>
            <button class="bg-btn" id="bgReset">🔄 重置</button>
            <input type="color" id="bgColor" style="width:40px; height:35px; border-radius:20px; border:none; cursor:pointer;">
        </div>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message assistant-message">
            <div class="bubble">🎉 欢迎使用 DeepSeek AI！<br>📸 支持图片/文件上传 | 🎤 语音输入<br>🔑 请先保存你的 API Key 开始对话～</div>
        </div>
    </div>

    <div class="toolbar">
        <button id="uploadBtn">📎 上传文件</button>
        <button id="clearFileBtn">🗑️ 清除附件</button>
        <button id="voiceBtn">🎤 语音输入</button>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="💬 输入消息..." disabled>
        <button id="sendBtn" disabled>发送 ✨</button>
    </div>
    <div class="status" id="status"></div>
    <div class="cost" id="costInfo"></div>
</div>

<script>
    const API_URL = 'https://api.deepseek.com/v1/chat/completions';
    let apiKey = localStorage.getItem('deepseek_api_key') || '';
    let currentConversationId = localStorage.getItem('current_conversation_id') || Date.now().toString();
    let conversations = JSON.parse(localStorage.getItem('conversations') || '{}');
    let pendingFile = null;
    let currentAssistantMessageDiv = null;
    let streamContent = '';

    // 确保当前对话存在
    if (!conversations[currentConversationId]) {
        conversations[currentConversationId] = {
            id: currentConversationId,
            title: '新对话',
            history: [],
            createdAt: Date.now()
        };
        saveConversations();
    }
    let conversationHistory = conversations[currentConversationId].history;

    // DOM
    const apiKeyInput = document.getElementById('apiKey');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const exportChatBtn = document.getElementById('exportChatBtn');
    const importChatBtn = document.getElementById('importChatBtn');
    const loadHistoryBtn = document.getElementById('loadHistoryBtn');
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');
    const costInfo = document.getElementById('costInfo');
    const uploadBtn = document.getElementById('uploadBtn');
    const clearFileBtn = document.getElementById('clearFileBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const themeToggle = document.getElementById('themeToggle');
    const openSidebar = document.getElementById('openSidebar');
    const closeSidebar = document.getElementById('closeSidebar');
    const sidebar = document.getElementById('sidebar');
    const menuOverlay = document.getElementById('menuOverlay');
    const conversationList = document.getElementById('conversationList');
    const newConvoSidebar = document.getElementById('newConvoSidebar');

    // 侧边栏控制
    function openSidebarFunc() {
        sidebar.classList.add('open');
        menuOverlay.classList.add('open');
    }
    function closeSidebarFunc() {
        sidebar.classList.remove('open');
        menuOverlay.classList.remove('open');
    }
    openSidebar.addEventListener('click', openSidebarFunc);
    closeSidebar.addEventListener('click', closeSidebarFunc);
    menuOverlay.addEventListener('click', closeSidebarFunc);

    // 保存所有对话
    function saveConversations() {
        localStorage.setItem('conversations', JSON.stringify(conversations));
        localStorage.setItem('current_conversation_id', currentConversationId);
    }

    // 切换对话
    function switchConversation(convoId) {
        if (!conversations[convoId]) return;
        currentConversationId = convoId;
        conversationHistory = conversations[convoId].history;
        saveConversations();
        renderChatFromHistory();
        closeSidebarFunc();
        // 更新标题显示
        document.title = conversations[convoId].title + ' - DeepSeek';
    }

    // 新建对话
    function newConversation() {
        const newId = Date.now().toString();
        conversations[newId] = {
            id: newId,
            title: `对话 ${Object.keys(conversations).length + 1}`,
            history: [],
            createdAt: Date.now()
        };
        currentConversationId = newId;
        conversationHistory = [];
        saveConversations();
        renderChatFromHistory();
        renderConversationList();
        closeSidebarFunc();
    }

    // 删除对话
    function deleteConversation(convoId, event) {
        event.stopPropagation();
        if (Object.keys(conversations).length <= 1) {
            // 至少保留一个对话
            conversations[convoId] = { id: convoId, title: '新对话', history: [], createdAt: Date.now() };
            saveConversations();
            renderConversationList();
            return;
        }
        delete conversations[convoId];
        if (currentConversationId === convoId) {
            const firstId = Object.keys(conversations)[0];
            currentConversationId = firstId;
            conversationHistory = conversations[firstId].history;
            renderChatFromHistory();
        }
        saveConversations();
        renderConversationList();
    }

    // 更新对话标题（从第一条用户消息获取）
    function updateConversationTitle() {
        const firstUserMsg = conversationHistory.find(m => m.role === 'user');
        if (firstUserMsg && conversations[currentConversationId]) {
            let title = typeof firstUserMsg.content === 'string' ? firstUserMsg.content.slice(0, 20) : '新对话';
            if (title.length > 20) title = title.slice(0, 17) + '...';
            conversations[currentConversationId].title = title;
            saveConversations();
            renderConversationList();
        }
    }

    // 渲染侧边栏对话列表
    function renderConversationList() {
        const convos = Object.values(conversations).sort((a,b) => b.createdAt - a.createdAt);
        conversationList.innerHTML = '';
        convos.forEach(convo => {
            const div = document.createElement('div');
            div.className = 'convo-item' + (convo.id === currentConversationId ? ' active' : '');
            div.innerHTML = `
                <span class="convo-title">💬 ${convo.title}</span>
                <button class="delete-convo">删除</button>
            `;
            div.addEventListener('click', () => switchConversation(convo.id));
            div.querySelector('.delete-convo').addEventListener('click', (e) => deleteConversation(convo.id, e));
            conversationList.appendChild(div);
        });
    }

    // 渲染聊天内容
    function renderChatFromHistory() {
        chatBox.innerHTML = '';
        if (!conversationHistory || conversationHistory.length === 0) {
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'message assistant-message';
            welcomeDiv.innerHTML = '<div class="bubble">✨ 新对话开始啦！发送消息吧～</div>';
            chatBox.appendChild(welcomeDiv);
            return;
        }
        for (let msg of conversationHistory) {
            if (msg.role === 'user') {
                let content = typeof msg.content === 'string' ? msg.content : '📎 [包含文件]';
                addUserMessageToUI(content);
            } else if (msg.role === 'assistant') {
                addAssistantMessageToUI(msg.content);
            }
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addUserMessageToUI(content, filePreview = '') {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message user-message';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerText = content;
        if (filePreview) {
            const span = document.createElement('div');
            span.style.cssText = 'font-size:11px; opacity:0.7; margin-top:6px;';
            span.innerText = filePreview;
            bubble.appendChild(span);
        }
        messageDiv.appendChild(bubble);
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addAssistantMessageToUI(content) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message assistant-message';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = marked.parse(content);
        bubble.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
        messageDiv.appendChild(bubble);
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showStatus(msg, isError = false) {
        statusDiv.innerText = msg;
        if (isError) setTimeout(() => { if(statusDiv.innerText === msg) statusDiv.innerText = ''; }, 3000);
    }

    function enableChat(enable) {
        userInput.disabled = !enable;
        sendBtn.disabled = !enable;
        if (!enable) statusDiv.innerText = '🔑 请先保存 API Key';
        else statusDiv.innerText = '';
    }

    function saveCurrentConversation() {
        conversations[currentConversationId].history = conversationHistory;
        saveConversations();
    }

    // 流式请求
    async function callDeepSeekStream(userMessage) {
        if (!apiKey) { showStatus('请先设置API Key', true); return; }
        let userContent = [];
        if (userMessage.trim()) userContent.push({ type: 'text', text: userMessage });
        let filePreview = '';
        if (pendingFile) {
            if (pendingFile.type === 'image') {
                userContent.push({ type: 'image_url', image_url: { url: pendingFile.data } });
                filePreview = `📷 图片: ${pendingFile.filename}`;
            } else if (pendingFile.type === 'text') {
                userContent.push({ type: 'text', text: `【文件内容: ${pendingFile.filename}】\n${pendingFile.content}\n【文件结束】` });
                filePreview = `📄 文本: ${pendingFile.filename}`;
            }
        }
        if (userContent.length === 0) { showStatus('请输入消息或上传文件', true); return; }
        
        const displayText = userMessage.trim() || (pendingFile ? `📎 [发送了文件]` : '');
        addUserMessageToUI(displayText, filePreview);
        conversationHistory.push({ role: 'user', content: userContent });
        saveCurrentConversation();
        updateConversationTitle();
        renderConversationList();

        const assistantDiv = document.createElement('div');
        assistantDiv.className = 'message assistant-message';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        assistantDiv.appendChild(bubble);
        chatBox.appendChild(assistantDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        currentAssistantMessageDiv = bubble;
        streamContent = '';

        sendBtn.disabled = true;
        userInput.disabled = true;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: conversationHistory,
                    stream: true
                })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        try {
                            const parsed = JSON.parse(data);
                            const delta = parsed.choices[0].delta.content;
                            if (delta) {
                                streamContent += delta;
                                currentAssistantMessageDiv.innerHTML = marked.parse(streamContent);
                                currentAssistantMessageDiv.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
                                chatBox.scrollTop = chatBox.scrollHeight;
                            }
                        } catch(e) {}
                    }
                }
            }
            conversationHistory.push({ role: 'assistant', content: streamContent });
            saveCurrentConversation();
            const estimateCost = ((streamContent.length / 4) * 0.000002).toFixed(6);
            costInfo.innerText = `💰 本次约 ¥${estimateCost}`;
            pendingFile = null;
        } catch (err) {
            currentAssistantMessageDiv.innerText = `❌ 错误: ${err.message}`;
            showStatus(err.message, true);
        } finally {
            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();
        }
    }

    function sendMessage() {
        const msg = userInput.value.trim();
        if (!msg && !pendingFile) { showStatus('请输入消息或上传文件', true); return; }
        userInput.value = '';
        callDeepSeekStream(msg);
    }

    // 文件上传
    function readFileAsBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }
    function readFileAsText(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsText(file, 'UTF-8');
        });
    }
    uploadBtn.addEventListener('click', () => {
        if (!apiKey) { showStatus('请先保存API Key', true); return; }
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,text/plain';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 5*1024*1024) { showStatus('文件超过5MB', true); return; }
            showStatus(`📂 读取 ${file.name}...`);
            try {
                if (file.type.startsWith('image/')) {
                    const base64 = await readFileAsBase64(file);
                    pendingFile = { type: 'image', data: base64, filename: file.name };
                    showStatus(`✅ 已添加图片: ${file.name}`);
                } else if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
                    const text = await readFileAsText(file);
                    if (text.length > 8000) { showStatus('文本太长，请缩减', true); return; }
                    pendingFile = { type: 'text', content: text, filename: file.name };
                    showStatus(`✅ 已添加文本: ${file.name}`);
                } else { showStatus('只支持图片或.txt', true); }
            } catch(err) { showStatus(`失败: ${err.message}`, true); }
        };
        input.click();
    });
    clearFileBtn.addEventListener('click', () => { pendingFile = null; showStatus('已清除附件'); });

    // 语音
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.continuous = false;
        voiceBtn.addEventListener('click', () => {
            recognition.start();
            showStatus('🎤 请说话...');
        });
        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            userInput.value = text;
            showStatus('✅ 语音识别完成');
        };
        recognition.onerror = () => showStatus('语音识别失败', true);
    } else {
        voiceBtn.style.display = 'none';
    }

    // 按钮事件
    saveKeyBtn.addEventListener('click', () => {
        let key = apiKeyInput.value.trim();
        if (!key) { showStatus('请输入API Key', true); return; }
        if (key === '已保存的密钥') return;
        apiKey = key;
        localStorage.setItem('deepseek_api_key', apiKey);
        apiKeyInput.value = '已保存的密钥';
        enableChat(true);
        showStatus('✅ 密钥保存成功');
    });
    clearChatBtn.addEventListener('click', () => {
        conversationHistory = [];
        saveCurrentConversation();
        renderChatFromHistory();
        pendingFile = null;
        showStatus('🗑️ 对话已清空');
    });
    loadHistoryBtn.addEventListener('click', () => {
        renderChatFromHistory();
        showStatus('📂 已加载');
    });
    exportChatBtn.addEventListener('click', () => {
        const dataStr = JSON.stringify(conversationHistory, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `deepseek_chat_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
    });
    importChatBtn.addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (Array.isArray(imported)) {
                        conversationHistory = imported;
                        saveCurrentConversation();
                        renderChatFromHistory();
                        updateConversationTitle();
                        showStatus('✅ 导入成功');
                    } else throw new Error();
                } catch(err) { showStatus('文件格式错误', true); }
            };
            reader.readAsText(file);
        };
        input.click();
    });
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !sendBtn.disabled) sendMessage(); });
    newConvoSidebar.addEventListener('click', newConversation);

    // 背景自定义
    const body = document.body;
    function setBackground(type, value) {
        body.classList.remove('custom-bg');
        if (type === 'gradient') {
            body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%)';
            body.style.backgroundSize = '400% 400%';
            body.style.animation = 'gradientShift 15s ease infinite';
        } else if (type === 'image') {
            body.style.background = `url(${value}) no-repeat center center fixed`;
            body.style.backgroundSize = 'cover';
            body.classList.add('custom-bg');
        } else if (type === 'color') {
            body.style.background = value;
            body.classList.add('custom-bg');
        }
        localStorage.setItem('bg_type', type);
        localStorage.setItem('bg_value', value);
    }
    function loadBackground() {
        const type = localStorage.getItem('bg_type');
        const value = localStorage.getItem('bg_value');
        if (type === 'gradient' || !type) {
            setBackground('gradient');
        } else if (type === 'image' && value) {
            setBackground('image', value);
        } else if (type === 'color' && value) {
            setBackground('color', value);
        }
    }
    document.getElementById('bgGradient').addEventListener('click', () => setBackground('gradient'));
    document.getElementById('bgReset').addEventListener('click', () => setBackground('gradient'));
    document.getElementById('bgUpload').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                setBackground('image', url);
            }
        };
        input.click();
    });
    document.getElementById('bgColor').addEventListener('change', (e) => {
        setBackground('color', e.target.value);
    });

    // 深色模式（切换文字颜色适配）
    let isDark = false;
    function toggleTheme() {
        isDark = !isDark;
        if (isDark) {
            document.body.style.background = 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)';
            document.body.style.backgroundSize = '400% 400%';
            document.body.style.animation = 'gradientShift 15s ease infinite';
            themeToggle.innerHTML = '☀️';
        } else {
            setBackground(localStorage.getItem('bg_type') || 'gradient', localStorage.getItem('bg_value'));
            themeToggle.innerHTML = '🌙';
        }
    }
    themeToggle.addEventListener('click', toggleTheme);

    // 初始化
    function init() {
        if (apiKey) {
            apiKeyInput.value = '已保存的密钥';
            enableChat(true);
        } else {
            enableChat(false);
        }
        loadBackground();
        renderChatFromHistory();
        renderConversationList();
    }
    init();
</script>
</body>
</html>
