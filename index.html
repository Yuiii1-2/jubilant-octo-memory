<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DeepSeek 智能助手 - 私人AI伙伴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* 主题颜色变量 (默认浅蓝) */
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --bg-sidebar: #f8fafc;
            --bg-main: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --message-user: #3b82f6;
            --message-bot: #f1f5f9;
            --hover: #f1f5f9;
            --shadow: 0 1px 3px rgba(0,0,0,0.05);
        }

        /* 多主题配色 */
        body.theme-mint {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg-sidebar: #ecfdf5;
            --bg-main: #ffffff;
            --message-user: #10b981;
            --message-bot: #ecfdf5;
        }
        body.theme-sakura {
            --primary: #f472b6;
            --primary-dark: #ec4899;
            --bg-sidebar: #fdf2f8;
            --bg-main: #ffffff;
            --message-user: #f472b6;
            --message-bot: #fce7f3;
        }
        body.theme-night {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --bg-sidebar: #1e1b2e;
            --bg-main: #0f0f1a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #334155;
            --message-user: #8b5cf6;
            --message-bot: #1e293b;
            --hover: #334155;
        }
        body.theme-amber {
            --primary: #f59e0b;
            --primary-dark: #d97706;
            --bg-sidebar: #fffbeb;
            --bg-main: #ffffff;
            --message-user: #f59e0b;
            --message-bot: #fef3c7;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* 布局容器 */
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* 侧边栏菜单 */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
            z-index: 20;
            overflow-y: auto;
        }

        /* 移动端侧边栏折叠 */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100%;
                box-shadow: 2px 0 12px rgba(0,0,0,0.1);
                transition: left 0.2s;
            }
            .sidebar.open {
                left: 0;
            }
            .menu-toggle {
                display: block;
            }
            .main-content {
                width: 100%;
            }
        }

        .menu-toggle {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 30;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 20px;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .new-chat-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 12px;
            width: 100%;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 16px;
        }
        .new-chat-btn:hover { background: var(--primary-dark); }

        .history-list {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
        }
        .history-item {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.1s;
            word-break: break-word;
        }
        .history-item:hover, .history-item.active {
            background: var(--hover);
        }
        .history-title {
            font-size: 14px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .delete-conv {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            opacity: 0;
            transition: 0.1s;
        }
        .history-item:hover .delete-conv { opacity: 1; }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .theme-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .theme-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .theme-btn.active { border-color: var(--primary); transform: scale(1.1);}
        .web-search-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
        }
        .toggle-switch {
            width: 44px;
            height: 24px;
            background: #cbd5e1;
            border-radius: 30px;
            position: relative;
            cursor: pointer;
        }
        .toggle-switch.active { background: var(--primary); }
        .toggle-switch::after {
            content: "";
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }
        .toggle-switch.active::after { left: 21px; }
        .api-key-input {
            width: 100%;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-main);
            color: var(--text-primary);
            font-size: 12px;
        }

        /* 主聊天区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            position: relative;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.bot { align-self: flex-start; }
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .message-content {
            background: var(--message-bot);
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.5;
            word-break: break-word;
        }
        .message.user .message-content {
            background: var(--message-user);
            color: white;
        }
        .image-preview {
            max-width: 180px;
            max-height: 180px;
            border-radius: 12px;
            margin-top: 8px;
        }
        .input-area {
            padding: 16px;
            border-top: 1px solid var(--border);
            background: var(--bg-main);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-box {
            flex: 1;
            background: var(--bg-sidebar);
            border-radius: 28px;
            padding: 10px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .selected-image {
            position: relative;
            display: inline-block;
        }
        .selected-image img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }
        .remove-img {
            position: absolute;
            top: -8px;
            right: -8px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 12px;
            text-align: center;
            cursor: pointer;
        }
        textarea {
            flex: 1;
            background: transparent;
            border: none;
            resize: none;
            font-size: 16px;
            outline: none;
            color: var(--text-primary);
            font-family: inherit;
            max-height: 120px;
        }
        .btn-icon {
            background: var(--primary);
            border: none;
            color: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .file-btn {
            background: var(--text-secondary);
        }
        .loading {
            font-style: italic;
            color: var(--text-secondary);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; } }
    </style>
</head>
<body>
<div class="app">
    <button class="menu-toggle" id="menuToggle">☰</button>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn">➕ 新建对话</button>
        </div>
        <div class="history-list" id="historyList"></div>
        <div class="sidebar-footer">
            <div class="web-search-toggle">
                <span>🔍 联网搜索</span>
                <div class="toggle-switch" id="webSearchToggle"></div>
            </div>
            <div class="theme-selector" id="themeSelector">
                <div class="theme-btn" data-theme="default" style="background:#3b82f6;"></div>
                <div class="theme-btn" data-theme="mint" style="background:#10b981;"></div>
                <div class="theme-btn" data-theme="sakura" style="background:#f472b6;"></div>
                <div class="theme-btn" data-theme="night" style="background:#8b5cf6;"></div>
                <div class="theme-btn" data-theme="amber" style="background:#f59e0b;"></div>
            </div>
            <input type="password" class="api-key-input" id="apiKeyInput" placeholder="DeepSeek API Key (需手动输入)" autocomplete="off">
            <button id="saveApiKeyBtn" style="background:var(--primary); border:none; color:white; border-radius:40px; padding:6px;">保存密钥</button>
            <div style="font-size:11px; color:var(--text-secondary); text-align:center;">💡 支持图片识别(自动切换VL模型)</div>
        </div>
    </div>

    <div class="main-content">
        <div class="chat-header">
            <h3>DeepSeek 智能对话</h3>
            <span style="font-size:12px" id="modelStatus">模型: deepseek-chat</span>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="input-area">
            <div class="input-box">
                <div id="imagePreviewContainer" style="display:flex; gap:6px; flex-wrap:wrap;"></div>
                <textarea id="messageInput" placeholder="发送消息... (支持图片上传/联网)" rows="1"></textarea>
                <input type="file" id="fileUpload" accept="image/*" style="display:none">
                <button class="btn-icon file-btn" id="uploadBtn">📎</button>
                <button class="btn-icon" id="sendBtn">➤</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- IndexedDB 存储 ----------
    const DB_NAME = 'DeepSeekDB';
    const STORE_NAME = 'conversations';
    let db = null;
    let currentConversationId = null;
    let currentImageBase64 = null;      // 当前待发送图片
    let webSearchEnabled = false;
    let apiKey = localStorage.getItem('deepseek_api_key') || '';
    
    // 初始化DB
    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => { db = request.result; resolve(); };
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                }
            };
        });
    }

    // 保存对话
    async function saveConversation(conversation) {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        await store.put(conversation);
        return new Promise(resolve => { tx.oncomplete = resolve; });
    }

    // 获取所有对话
    async function getAllConversations() {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const conversations = await store.getAll();
        return conversations.sort((a,b) => b.updatedAt - a.updatedAt);
    }

    // 删除对话
    async function deleteConversation(id) {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        await store.delete(id);
    }

    // 创建新对话
    async function createNewConversation(title = '新对话') {
        const newConv = {
            id: Date.now().toString(),
            title: title,
            messages: [],
            createdAt: Date.now(),
            updatedAt: Date.now()
        };
        await saveConversation(newConv);
        return newConv;
    }

    // 更新当前对话的消息并存储
    async function updateCurrentConversation(messages) {
        if (!currentConversationId) return;
        const conv = await getConversation(currentConversationId);
        if (conv) {
            conv.messages = messages;
            conv.updatedAt = Date.now();
            if (conv.messages.length && conv.title === '新对话' && conv.messages[0]?.content?.substring(0,20)) {
                conv.title = conv.messages[0].content.substring(0, 20);
            }
            await saveConversation(conv);
            renderHistoryList();
        }
    }

    async function getConversation(id) {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        return await store.get(id);
    }

    // 渲染侧边栏历史
    async function renderHistoryList() {
        const convs = await getAllConversations();
        const container = document.getElementById('historyList');
        if (!container) return;
        container.innerHTML = '';
        for (const conv of convs) {
            const div = document.createElement('div');
            div.className = 'history-item';
            if (currentConversationId === conv.id) div.classList.add('active');
            div.innerHTML = `
                <span class="history-title">${escapeHtml(conv.title)}</span>
                <button class="delete-conv" data-id="${conv.id}">🗑️</button>
            `;
            div.querySelector('.history-title').addEventListener('click', () => switchConversation(conv.id));
            div.querySelector('.delete-conv').addEventListener('click', (e) => {
                e.stopPropagation();
                deleteConversationHandler(conv.id);
            });
            container.appendChild(div);
        }
        if (convs.length === 0) {
            container.innerHTML = '<div style="padding:12px; text-align:center; color:var(--text-secondary)">暂无对话，点击新建</div>';
        }
    }

    async function deleteConversationHandler(id) {
        if (currentConversationId === id) {
            const all = await getAllConversations();
            const next = all.find(c => c.id !== id);
            if (next) await switchConversation(next.id);
            else {
                const newConv = await createNewConversation();
                await switchConversation(newConv.id);
            }
        }
        await deleteConversation(id);
        await renderHistoryList();
    }

    async function switchConversation(id) {
        currentConversationId = id;
        const conv = await getConversation(id);
        if (conv) {
            renderMessages(conv.messages);
        } else {
            renderMessages([]);
        }
        await renderHistoryList();
        document.getElementById('sidebar')?.classList.remove('open');
    }

    function renderMessages(messages) {
        const container = document.getElementById('messagesArea');
        container.innerHTML = '';
        if (!messages.length) {
            container.innerHTML = '<div style="text-align:center; margin-top:40px; color:var(--text-secondary)">✨ 开始和DeepSeek对话吧！支持图片、联网✨</div>';
            return;
        }
        for (const msg of messages) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${msg.role}`;
            let contentHtml = `<div class="message-content">${escapeHtml(msg.content)}`;
            if (msg.images && msg.images.length) {
                for (const img of msg.images) {
                    contentHtml += `<br><img src="${img}" class="image-preview" alt="uploaded">`;
                }
            }
            contentHtml += `</div><div class="message-avatar">${msg.role === 'user' ? '👤' : '🤖'}</div>`;
            messageDiv.innerHTML = contentHtml;
            container.appendChild(messageDiv);
        }
        container.scrollTop = container.scrollHeight;
    }

    // 添加消息到当前对话（内存+存储）
    async function addMessageToCurrent(role, content, images = []) {
        if (!currentConversationId) return;
        const conv = await getConversation(currentConversationId);
        if (!conv) return;
        const newMsg = { role, content, images, timestamp: Date.now() };
        conv.messages.push(newMsg);
        await saveConversation(conv);
        renderMessages(conv.messages);
        return conv.messages;
    }

    // 调用DeepSeek API
    async function callDeepSeek(messages, userMessageText, imageBase64ForThis = null) {
        const key = document.getElementById('apiKeyInput').value || apiKey;
        if (!key) { alert('请先填写DeepSeek API Key'); return null; }
        apiKey = key;
        localStorage.setItem('deepseek_api_key', key);
        
        const hasImage = !!imageBase64ForThis;
        let model = hasImage ? 'deepseek-vl' : 'deepseek-chat';
        document.getElementById('modelStatus').innerText = `模型: ${model} ${webSearchEnabled ? '🔍联网' : ''}`;
        
        // 构建发送的消息列表（获取当前对话历史）
        const conversation = await getConversation(currentConversationId);
        let apiMessages = [];
        for (const m of conversation.messages) {
            if (m.role === 'user') {
                if (m.images && m.images.length && model === 'deepseek-vl') {
                    // 多模态内容
                    const contentArr = [{ type: 'text', text: m.content }];
                    for (const img of m.images) {
                        contentArr.push({ type: 'image_url', image_url: { url: img } });
                    }
                    apiMessages.push({ role: 'user', content: contentArr });
                } else {
                    apiMessages.push({ role: 'user', content: m.content });
                }
            } else {
                apiMessages.push({ role: 'assistant', content: m.content });
            }
        }
        // 添加当前新消息
        if (hasImage && model === 'deepseek-vl') {
            const contentArr = [{ type: 'text', text: userMessageText || '请识别这张图片' }];
            contentArr.push({ type: 'image_url', image_url: { url: imageBase64ForThis } });
            apiMessages.push({ role: 'user', content: contentArr });
        } else {
            apiMessages.push({ role: 'user', content: userMessageText });
        }
        
        const payload = {
            model: model,
            messages: apiMessages,
            stream: false,
            temperature: 0.7,
        };
        if (webSearchEnabled && !hasImage && model === 'deepseek-chat') {
            payload.enable_search = true;
        }
        
        const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
            body: JSON.stringify(payload)
        });
        if (!response.ok) {
            const err = await response.text();
            throw new Error(`API错误 ${response.status}: ${err}`);
        }
        const data = await response.json();
        return data.choices[0].message.content;
    }
    
    // 发送流程
    async function sendMessage() {
        const inputElem = document.getElementById('messageInput');
        let text = inputElem.value.trim();
        if (!text && !currentImageBase64) {
            alert('请输入消息或选择图片');
            return;
        }
        const userText = text || (currentImageBase64 ? '识别这张图片' : '');
        const imageToSend = currentImageBase64;
        // 清空输入和图片
        inputElem.value = '';
        if (currentImageBase64) {
            await addMessageToCurrent('user', userText, [currentImageBase64]);
        } else {
            await addMessageToCurrent('user', userText, []);
        }
        // 清除本地图片待发
        clearSelectedImage();
        // 显示加载状态
        const loadingMsgDiv = document.createElement('div');
        loadingMsgDiv.className = 'message bot';
        loadingMsgDiv.innerHTML = `<div class="message-content loading">🤖 DeepSeek 思考中...</div><div class="message-avatar">🤖</div>`;
        document.getElementById('messagesArea').appendChild(loadingMsgDiv);
        document.getElementById('messagesArea').scrollTop = document.getElementById('messagesArea').scrollHeight;
        
        try {
            let reply = await callDeepSeek(null, userText, imageToSend);
            // 移除loading
            loadingMsgDiv.remove();
            await addMessageToCurrent('assistant', reply, []);
        } catch (error) {
            loadingMsgDiv.remove();
            await addMessageToCurrent('assistant', `❌ 错误: ${error.message}`, []);
            console.error(error);
        }
    }
    
    // 图片上传预览
    function handleImageUpload(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            currentImageBase64 = e.target.result;
            const container = document.getElementById('imagePreviewContainer');
            container.innerHTML = '';
            const imgDiv = document.createElement('div');
            imgDiv.className = 'selected-image';
            imgDiv.innerHTML = `<img src="${currentImageBase64}" style="width:60px;height:60px;border-radius:8px;"><span class="remove-img">✖</span>`;
            imgDiv.querySelector('.remove-img').onclick = () => clearSelectedImage();
            container.appendChild(imgDiv);
        };
        reader.readAsDataURL(file);
    }
    function clearSelectedImage() {
        currentImageBase64 = null;
        document.getElementById('imagePreviewContainer').innerHTML = '';
    }
    
    // 主题切换
    function initThemes() {
        const savedTheme = localStorage.getItem('app_theme') || 'default';
        document.body.className = `theme-${savedTheme}`;
        document.querySelectorAll('.theme-btn').forEach(btn => {
            const theme = btn.dataset.theme;
            if ((theme === 'default' && savedTheme === 'default') || theme === savedTheme) btn.classList.add('active');
            else btn.classList.remove('active');
            btn.onclick = () => {
                document.body.className = `theme-${theme}`;
                localStorage.setItem('app_theme', theme);
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
        });
    }
    
    // 联网搜索开关
    function initWebSearchToggle() {
        const saved = localStorage.getItem('web_search_enabled') === 'true';
        webSearchEnabled = saved;
        const toggle = document.getElementById('webSearchToggle');
        if (webSearchEnabled) toggle.classList.add('active');
        else toggle.classList.remove('active');
        toggle.onclick = () => {
            webSearchEnabled = !webSearchEnabled;
            localStorage.setItem('web_search_enabled', webSearchEnabled);
            if (webSearchEnabled) toggle.classList.add('active');
            else toggle.classList.remove('active');
        };
    }
    
    // 辅助函数
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    // 初始化数据并自动创建默认对话
    async function bootstrap() {
        await initDB();
        await initThemes();
        initWebSearchToggle();
        const apiInput = document.getElementById('apiKeyInput');
        if (apiKey) apiInput.value = apiKey;
        document.getElementById('saveApiKeyBtn').onclick = () => {
            const newKey = apiInput.value.trim();
            if(newKey) {
                apiKey = newKey;
                localStorage.setItem('deepseek_api_key', newKey);
                alert('API Key已保存');
            } else alert('请输入有效Key');
        };
        let conversations = await getAllConversations();
        if (conversations.length === 0) {
            const newConv = await createNewConversation('示例对话');
            currentConversationId = newConv.id;
        } else {
            currentConversationId = conversations[0].id;
        }
        await switchConversation(currentConversationId);
        document.getElementById('newChatBtn').onclick = async () => {
            const newConv = await createNewConversation('新对话');
            await switchConversation(newConv.id);
        };
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('uploadBtn').onclick = () => document.getElementById('fileUpload').click();
        document.getElementById('fileUpload').onchange = (e) => {
            if(e.target.files[0]) handleImageUpload(e.target.files[0]);
            e.target.value = '';
        };
        const textarea = document.getElementById('messageInput');
        textarea.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        // 移动端菜单
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        menuToggle.onclick = () => sidebar.classList.toggle('open');
        document.addEventListener('click', (e) => {
            if(window.innerWidth <= 768 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });
    }
    
    bootstrap().catch(console.error);
</script>
</body>
</html>
