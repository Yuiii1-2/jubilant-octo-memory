<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DeepSeek AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            min-height: 100vh;
            padding: 16px;
            position: relative;
            transition: background 0.3s ease;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body.custom-bg {
            animation: none;
            background-size: cover !important;
            background-position: center !important;
            background-attachment: fixed !important;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            height: calc(100vh - 32px);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        /* ========== 侧边栏菜单 ========== */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 998;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .menu-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -85%;
            width: 85%;
            max-width: 340px;
            height: 100%;
            background: rgba(20,20,35,0.96);
            backdrop-filter: blur(20px);
            z-index: 999;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 20px rgba(0,0,0,0.3);
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            color: white;
            font-size: 1.2rem;
        }

        .close-sidebar {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: white;
            padding: 0;
        }

        .sidebar-section {
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 12px 16px;
        }

        .sidebar-section-title {
            color: rgba(255,255,255,0.6);
            font-size: 0.7rem;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .sidebar-section-title .toggle-icon {
            font-size: 0.8rem;
        }

        .sidebar-section-content {
            transition: all 0.3s ease;
        }

        .sidebar-section-content.collapsed {
            display: none;
        }

        .new-convo-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 8px;
        }

        .conversation-list {
            max-height: 250px;
            overflow-y: auto;
        }

        .convo-item {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .convo-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .convo-item .convo-title {
            color: white;
            font-size: 0.85rem;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 重命名输入框样式 */
        .rename-input {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 20px;
            padding: 6px 12px;
            color: white;
            font-size: 0.85rem;
            flex: 1;
            outline: none;
        }

        .api-input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .api-input-group input {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 16px;
            border-radius: 40px;
            font-size: 14px;
            color: white;
            outline: none;
        }

        .api-input-group input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .api-buttons {
            display: flex;
            gap: 8px;
        }

        .api-buttons button {
            flex: 1;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 40px;
            font-size: 13px;
            color: white;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2) !important;
            border: none !important;
        }

        .bg-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .bg-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 12px;
            color: white;
            cursor: pointer;
        }

        .color-picker {
            width: 44px;
            height: 36px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            background: transparent;
        }

        .data-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .data-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 12px;
            color: white;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        /* 主界面头部 - 极简 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .header-left {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .menu-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            color: white;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        /* 聊天区域 */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 8px 4px 20px 4px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-box::-webkit-scrollbar {
            width: 5px;
        }

        .chat-box::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.4);
            border-radius: 10px;
        }

        .message {
            display: flex;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            justify-content: flex-end;
        }

        .assistant-message {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 24px;
            font-size: 15px;
            line-height: 1.45;
            word-wrap: break-word;
            backdrop-filter: blur(20px);
        }

        .user-message .bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 15px rgba(102,126,234,0.3);
        }

        .assistant-message .bubble {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-bottom-left-radius: 6px;
        }

        /* 表格样式 */
        .assistant-message .bubble table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 13px;
            border-radius: 12px;
            overflow: hidden;
            display: block;
            overflow-x: auto;
        }

        .assistant-message .bubble th,
        .assistant-message .bubble td {
            padding: 10px 12px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .assistant-message .bubble th {
            background: rgba(102,126,234,0.4);
            font-weight: 600;
            color: #fff;
        }

        .assistant-message .bubble tr:nth-child(even) {
            background: rgba(255,255,255,0.05);
        }

        .assistant-message .bubble tr:hover {
            background: rgba(255,255,255,0.1);
        }

        .assistant-message .bubble code {
            font-family: monospace;
            font-size: 13px;
        }

        .assistant-message .bubble pre {
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 12px;
            overflow-x: auto;
        }

        /* 极简输入区域 - 只保留上传文件 */
        .input-wrapper {
            position: relative;
            margin-top: 8px;
        }

        .input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border-radius: 44px;
            padding: 6px 6px 6px 16px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .input-area input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            font-size: 16px;
            color: white;
            outline: none;
        }

        .input-area input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .upload-icon {
            background: rgba(255,255,255,0.15);
            border: none;
            padding: 8px 12px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
        }

        .upload-icon:active {
            transform: scale(0.95);
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            transform: none;
        }

        .status {
            text-align: center;
            font-size: 11px;
            margin-top: 8px;
            color: rgba(255,255,255,0.6);
        }

        .cost {
            text-align: right;
            font-size: 10px;
            margin-top: 4px;
            color: rgba(255,255,255,0.4);
        }

        .file-indicator {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            margin-top: 4px;
            padding-left: 12px;
        }
    </style>
</head>
<body>

<!-- 侧边栏遮罩 -->
<div class="menu-overlay" id="menuOverlay"></div>

<!-- 侧边栏菜单 -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3>📋 菜单</h3>
        <button class="close-sidebar" id="closeSidebar">✕</button>
    </div>

    <div style="padding: 12px 16px;">
        <button class="new-convo-btn" id="newConvoSidebar">➕ 新建对话</button>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-section-title" onclick="toggleSection('historySection')">
            📂 历史对话 <span class="toggle-icon" id="historyIcon">▼</span>
        </div>
        <div class="sidebar-section-content" id="historySection">
            <div class="conversation-list" id="conversationList"></div>
        </div>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-section-title" onclick="toggleSection('apiSection')">
            🔑 API 设置 <span class="toggle-icon" id="apiIcon">▼</span>
        </div>
        <div class="sidebar-section-content" id="apiSection">
            <div class="api-input-group">
                <input type="password" id="apiKey" placeholder="DeepSeek API Key" autocomplete="off">
                <div class="api-buttons">
                    <button id="saveKeyBtn" class="btn-primary">保存密钥</button>
                    <button id="clearChatBtn">清空对话</button>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-section-title" onclick="toggleSection('bgSection')">
            🎨 背景设置 <span class="toggle-icon" id="bgIcon">▼</span>
        </div>
        <div class="sidebar-section-content" id="bgSection">
            <div class="bg-controls">
                <button class="bg-btn" id="bgGradient">🌈 渐变</button>
                <button class="bg-btn" id="bgUpload">🖼️ 上传图片</button>
                <button class="bg-btn" id="bgReset">🔄 重置</button>
                <input type="color" id="bgColor" class="color-picker" value="#667eea">
            </div>
        </div>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-section-title" onclick="toggleSection('dataSection')">
            💾 数据管理 <span class="toggle-icon" id="dataIcon">▼</span>
        </div>
        <div class="sidebar-section-content" id="dataSection">
            <div class="data-buttons">
                <button class="data-btn" id="exportChatBtn">📤 导出</button>
                <button class="data-btn" id="importChatBtn">📥 导入</button>
                <button class="data-btn" id="loadHistoryBtn">📂 加载</button>
            </div>
        </div>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-section-title" onclick="toggleSection('themeSection')">
            🌓 深色模式 <span class="toggle-icon" id="themeIcon">▼</span>
        </div>
        <div class="sidebar-section-content" id="themeSection">
            <div class="data-buttons">
                <button class="data-btn" id="themeToggle">🌙 切换深色模式</button>
            </div>
        </div>
    </div>
</div>

<!-- 主界面 -->
<div class="container">
    <div class="header">
        <div class="header-left">
            <button class="menu-btn" id="openSidebar">☰</button>
            <h1>DeepSeek AI</h1>
        </div>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message assistant-message">
            <div class="bubble">✨ 欢迎使用 DeepSeek AI！<br>📊 我支持生成表格，对比类问题会自动用表格呈现<br>📎 点击输入框旁的📎上传文件<br>🔑 点击左上角菜单设置 API Key</div>
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-area">
            <button class="upload-icon" id="uploadBtn" title="上传文件">📎</button>
            <input type="text" id="userInput" placeholder="输入消息..." disabled>
            <button class="send-btn" id="sendBtn" disabled>发送</button>
        </div>
        <div class="file-indicator" id="fileIndicator"></div>
    </div>
    <div class="status" id="status"></div>
    <div class="cost" id="costInfo"></div>
</div>

<script>
    function toggleSection(sectionId) {
        const content = document.getElementById(sectionId);
        const icon = document.getElementById(sectionId + 'Icon');
        if (content.classList.contains('collapsed')) {
            content.classList.remove('collapsed');
            icon.innerHTML = '▼';
        } else {
            content.classList.add('collapsed');
            icon.innerHTML = '▶';
        }
    }

    const API_URL = 'https://api.deepseek.com/v1/chat/completions';
    let apiKey = localStorage.getItem('deepseek_api_key') || '';
    let currentConversationId = localStorage.getItem('current_conversation_id') || Date.now().toString();
    let conversations = JSON.parse(localStorage.getItem('conversations') || '{}');
    let pendingFile = null;
    let currentAssistantMessageDiv = null;
    let streamContent = '';

    if (!conversations[currentConversationId]) {
        conversations[currentConversationId] = {
            id: currentConversationId,
            title: '新对话',
            history: [],
            createdAt: Date.now()
        };
        saveConversations();
    }
    let conversationHistory = conversations[currentConversationId].history;

    // DOM
    const apiKeyInput = document.getElementById('apiKey');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const exportChatBtn = document.getElementById('exportChatBtn');
    const importChatBtn = document.getElementById('importChatBtn');
    const loadHistoryBtn = document.getElementById('loadHistoryBtn');
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');
    const costInfo = document.getElementById('costInfo');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileIndicator = document.getElementById('fileIndicator');
    const themeToggle = document.getElementById('themeToggle');
    const openSidebar = document.getElementById('openSidebar');
    const closeSidebar = document.getElementById('closeSidebar');
    const sidebar = document.getElementById('sidebar');
    const menuOverlay = document.getElementById('menuOverlay');
    const conversationList = document.getElementById('conversationList');
    const newConvoSidebar = document.getElementById('newConvoSidebar');

    function openSidebarFunc() { sidebar.classList.add('open'); menuOverlay.classList.add('open'); }
    function closeSidebarFunc() { sidebar.classList.remove('open'); menuOverlay.classList.remove('open'); }
    openSidebar.addEventListener('click', openSidebarFunc);
    closeSidebar.addEventListener('click', closeSidebarFunc);
    menuOverlay.addEventListener('click', closeSidebarFunc);

    function saveConversations() {
        localStorage.setItem('conversations', JSON.stringify(conversations));
        localStorage.setItem('current_conversation_id', currentConversationId);
    }

    function switchConversation(convoId) {
        if (!conversations[convoId]) return;
        currentConversationId = convoId;
        conversationHistory = conversations[convoId].history;
        saveConversations();
        renderChatFromHistory();
        closeSidebarFunc();
        renderConversationList();
    }

    function newConversation() {
        const newId = Date.now().toString();
        conversations[newId] = {
            id: newId,
            title: `对话 ${Object.keys(conversations).length + 1}`,
            history: [],
            createdAt: Date.now()
        };
        currentConversationId = newId;
        conversationHistory = [];
        saveConversations();
        renderChatFromHistory();
        renderConversationList();
        closeSidebarFunc();
    }

    function deleteConversation(convoId) {
        if (Object.keys(conversations).length <= 1) {
            showStatus('至少保留一个对话', true);
            return;
        }
        delete conversations[convoId];
        if (currentConversationId === convoId) {
            const firstId = Object.keys(conversations)[0];
            currentConversationId = firstId;
            conversationHistory = conversations[firstId].history;
            renderChatFromHistory();
        }
        saveConversations();
        renderConversationList();
        showStatus('已删除对话');
    }

    function renameConversation(convoId, newTitle) {
        if (conversations[convoId] && newTitle && newTitle.trim()) {
            conversations[convoId].title = newTitle.trim().slice(0, 30);
            saveConversations();
            renderConversationList();
            showStatus('已重命名');
        }
    }

    // 显示上下文菜单（手机长按 / 电脑右键）
    function showContextMenu(event, convoId, currentTitle) {
        event.preventDefault();
        event.stopPropagation();
        
        const isMobile = 'ontouchstart' in window;
        
        if (isMobile) {
            // 手机：弹出对话框选择操作
            const action = confirm(`对话: ${currentTitle}\n\n确定要删除这个对话吗？\n(点"取消"可以重命名)`);
            if (action) {
                deleteConversation(convoId);
            } else {
                const newName = prompt('输入新名称:', currentTitle);
                if (newName && newName.trim()) {
                    renameConversation(convoId, newName);
                }
            }
        } else {
            // 电脑：右键菜单
            const menu = document.createElement('div');
            menu.style.cssText = `
                position: fixed;
                top: ${event.clientY}px;
                left: ${event.clientX}px;
                background: rgba(30,30,40,0.95);
                backdrop-filter: blur(10px);
                border-radius: 12px;
                padding: 8px 0;
                z-index: 10000;
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
                min-width: 120px;
            `;
            menu.innerHTML = `
                <div style="padding: 8px 16px; color: white; cursor: pointer; hover:background:rgba(255,255,255,0.1)" id="menuRename">✏️ 重命名</div>
                <div style="padding: 8px 16px; color: #ff6b6b; cursor: pointer; hover:background:rgba(255,255,255,0.1)" id="menuDelete">🗑️ 删除</div>
            `;
            document.body.appendChild(menu);
            
            document.getElementById('menuRename').onclick = () => {
                const newName = prompt('输入新名称:', currentTitle);
                if (newName && newName.trim()) renameConversation(convoId, newName);
                menu.remove();
            };
            document.getElementById('menuDelete').onclick = () => {
                deleteConversation(convoId);
                menu.remove();
            };
            document.body.onclick = () => menu.remove();
        }
    }

    function renderConversationList() {
        const convos = Object.values(conversations).sort((a,b) => b.createdAt - a.createdAt);
        conversationList.innerHTML = '';
        convos.forEach(convo => {
            const div = document.createElement('div');
            div.className = 'convo-item' + (convo.id === currentConversationId ? ' active' : '');
            div.innerHTML = `<span class="convo-title">💬 ${escapeHtml(convo.title)}</span>`;
            div.addEventListener('click', (e) => {
                e.stopPropagation();
                switchConversation(convo.id);
            });
            // 长按/右键显示菜单
            div.addEventListener('contextmenu', (e) => showContextMenu(e, convo.id, convo.title));
            let touchTimer = null;
            div.addEventListener('touchstart', (e) => {
                touchTimer = setTimeout(() => {
                    showContextMenu(e, convo.id, convo.title);
                }, 500);
            });
            div.addEventListener('touchend', () => {
                if (touchTimer) clearTimeout(touchTimer);
            });
            div.addEventListener('touchmove', () => {
                if (touchTimer) clearTimeout(touchTimer);
            });
            conversationList.appendChild(div);
        });
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function renderChatFromHistory() {
        chatBox.innerHTML = '';
        if (!conversationHistory || conversationHistory.length === 0) {
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'message assistant-message';
            welcomeDiv.innerHTML = '<div class="bubble">✨ 新对话开始啦！发送消息吧～</div>';
            chatBox.appendChild(welcomeDiv);
            return;
        }
        for (let msg of conversationHistory) {
            if (msg.role === 'user') {
                let content = typeof msg.content === 'string' ? msg.content : '📎 [包含文件]';
                addUserMessageToUI(content);
            } else if (msg.role === 'assistant') {
                addAssistantMessageToUI(msg.content);
            }
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addUserMessageToUI(content, filePreview = '') {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message user-message';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerText = content;
        if (filePreview) {
            const span = document.createElement('div');
            span.style.cssText = 'font-size:11px; opacity:0.7; margin-top:6px;';
            span.innerText = filePreview;
            bubble.appendChild(span);
        }
        messageDiv.appendChild(bubble);
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addAssistantMessageToUI(content) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message assistant-message';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = marked.parse(content);
        bubble.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
        messageDiv.appendChild(bubble);
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showStatus(msg, isError = false) {
        statusDiv.innerText = msg;
        if (isError) setTimeout(() => { if(statusDiv.innerText === msg) statusDiv.innerText = ''; }, 3000);
    }

    function enableChat(enable) {
        userInput.disabled = !enable;
        sendBtn.disabled = !enable;
        if (!enable) statusDiv.innerText = '🔑 请先在菜单中设置 API Key';
        else statusDiv.innerText = '';
    }

    function saveCurrentConversation() {
        conversations[currentConversationId].history = conversationHistory;
        saveConversations();
    }

    function updateFileIndicator() {
        if (pendingFile) {
            fileIndicator.innerText = `📎 已添加: ${pendingFile.filename}`;
        } else {
            fileIndicator.innerText = '';
        }
    }

    async function callDeepSeekStream(userMessage) {
        if (!apiKey) { showStatus('请先设置API Key', true); return; }
        let userContent = [];
        if (userMessage.trim()) userContent.push({ type: 'text', text: userMessage });
        let filePreview = '';
        if (pendingFile) {
            if (pendingFile.type === 'image') {
                userContent.push({ type: 'image_url', image_url: { url: pendingFile.data } });
                filePreview = `📷 图片: ${pendingFile.filename}`;
            } else if (pendingFile.type === 'text') {
                userContent.push({ type: 'text', text: `【文件内容: ${pendingFile.filename}】\n${pendingFile.content}\n【文件结束】` });
                filePreview = `📄 文本: ${pendingFile.filename}`;
            }
        }
        if (userContent.length === 0) { showStatus('请输入消息或上传文件', true); return; }
        
        const displayText = userMessage.trim() || (pendingFile ? `📎 [发送了文件]` : '');
        addUserMessageToUI(displayText, filePreview);
        
        const messagesWithSystem = [
            {
                role: 'system',
                content: '你是一个专业的AI助手。当回答涉及对比、分类、数据、步骤、选项等需要清晰呈现的信息时，请优先使用Markdown表格来展示，让用户更直观地理解。表格要有表头和行列对齐。如果问题适合用表格回答，一定要用表格。同时保持回答自然友好。'
            },
            ...conversationHistory,
            { role: 'user', content: userContent }
        ];
        
        conversationHistory.push({ role: 'user', content: userContent });
        saveCurrentConversation();
        updateConversationTitle();
        renderConversationList();

        const assistantDiv = document.createElement('div');
        assistantDiv.className = 'message assistant-message';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        assistantDiv.appendChild(bubble);
        chatBox.appendChild(assistantDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        currentAssistantMessageDiv = bubble;
        streamContent = '';

        sendBtn.disabled = true;
        userInput.disabled = true;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: messagesWithSystem,
                    stream: true
                })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        try {
                            const parsed = JSON.parse(data);
                            const delta = parsed.choices[0].delta.content;
                            if (delta) {
                                streamContent += delta;
                                currentAssistantMessageDiv.innerHTML = marked.parse(streamContent);
                                currentAssistantMessageDiv.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
                                chatBox.scrollTop = chatBox.scrollHeight;
                            }
                        } catch(e) {}
                    }
                }
            }
            conversationHistory.push({ role: 'assistant', content: streamContent });
            saveCurrentConversation();
            const estimateCost = ((streamContent.length / 4) * 0.000002).toFixed(6);
            costInfo.innerText = `💰 本次约 ¥${estimateCost}`;
            pendingFile = null;
            updateFileIndicator();
        } catch (err) {
            currentAssistantMessageDiv.innerText = `❌ 错误: ${err.message}`;
            showStatus(err.message, true);
        } finally {
            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();
        }
    }

    function updateConversationTitle() {
        const firstUserMsg = conversationHistory.find(m => m.role === 'user');
        if (firstUserMsg && conversations[currentConversationId]) {
            let title = typeof firstUserMsg.content === 'string' ? firstUserMsg.content.slice(0, 20) : '新对话';
            if (title.length > 20) title = title.slice(0, 17) + '...';
            conversations[currentConversationId].title = title;
            saveConversations();
            renderConversationList();
        }
    }

    function sendMessage() {
        const msg = userInput.value.trim();
        if (!msg && !pendingFile) { showStatus('请输入消息或上传文件', true); return; }
        userInput.value = '';
        callDeepSeekStream(msg);
    }

    // 文件上传
    function readFileAsBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }
    function readFileAsText(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsText(file, 'UTF-8');
        });
    }
    uploadBtn.addEventListener('click', () => {
        if (!apiKey) { showStatus('请先保存API Key', true); return; }
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,text/plain';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 5*1024*1024) { showStatus('文件超过5MB', true); return; }
            showStatus(`📂 读取 ${file.name}...`);
            try {
                if (file.type.startsWith('image/')) {
                    const base64 = await readFileAsBase64(file);
                    pendingFile = { type: 'image', data: base64, filename: file.name };
                    showStatus(`✅ 已添加图片: ${file.name}`);
                } else if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
                    const text = await readFileAsText(file);
                    if (text.length > 8000) { showStatus('文本太长，请缩减', true); return; }
                    pendingFile = { type: 'text', content: text, filename: file.name };
                    showStatus(`✅ 已添加文本: ${file.name}`);
                } else { showStatus('只支持图片或.txt', true); }
                updateFileIndicator();
            } catch(err) { showStatus(`失败: ${err.message}`, true); }
        };
        input.click();
    });

    // 按钮事件
    saveKeyBtn.addEventListener('click', () => {
        let key = apiKeyInput.value.trim();
        if (!key) { showStatus('请输入API Key', true); return; }
        if (key === '已保存的密钥') return;
        apiKey = key;
        localStorage.setItem('deepseek_api_key', apiKey);
        apiKeyInput.value = '已保存的密钥';
        enableChat(true);
        showStatus('✅ 密钥保存成功');
        closeSidebarFunc();
    });
    clearChatBtn.addEventListener('click', () => {
        conversationHistory = [];
        saveCurrentConversation();
        renderChatFromHistory();
        pendingFile = null;
        updateFileIndicator();
        showStatus('🗑️ 对话已清空');
        closeSidebarFunc();
    });
    loadHistoryBtn.addEventListener('click', () => {
        renderChatFromHistory();
        showStatus('📂 已加载');
        closeSidebarFunc();
    });
    exportChatBtn.addEventListener('click', () => {
        const dataStr = JSON.stringify(conversationHistory, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `deepseek_chat_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        closeSidebarFunc();
    });
    importChatBtn.addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (Array.isArray(imported)) {
                        conversationHistory = imported;
                        saveCurrentConversation();
                        renderChatFromHistory();
                        updateConversationTitle();
                        showStatus('✅ 导入成功');
                    } else throw new Error();
                } catch(err) { showStatus('文件格式错误', true); }
            };
            reader.readAsText(file);
        };
        input.click();
        closeSidebarFunc();
    });
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !sendBtn.disabled) sendMessage(); });
    newConvoSidebar.addEventListener('click', newConversation);

    // 背景自定义
    const body = document.body;
    function setBackground(type, value) {
        body.classList.remove('custom-bg');
        if (type === 'gradient') {
            body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%)';
            body.style.backgroundSize = '400% 400%';
            body.style.animation = 'gradientShift 15s ease infinite';
        } else if (type === 'image') {
            body.style.background = `url(${value}) no-repeat center center fixed`;
            body.style.backgroundSize = 'cover';
            body.classList.add('custom-bg');
        } else if (type === 'color') {
            body.style.background = value;
            body.classList.add('custom-bg');
        }
        localStorage.setItem('bg_type', type);
        localStorage.setItem('bg_value', value);
    }
    function loadBackground() {
        const type = localStorage.getItem('bg_type');
        const value = localStorage.getItem('bg_value');
        if (type === 'gradient' || !type) setBackground('gradient');
        else if (type === 'image' && value) setBackground('image', value);
        else if (type === 'color' && value) setBackground('color', value);
    }
    document.getElementById('bgGradient').addEventListener('click', () => { setBackground('gradient'); closeSidebarFunc(); });
    document.getElementById('bgReset').addEventListener('click', () => { setBackground('gradient'); closeSidebarFunc(); });
    document.getElementById('bgUpload').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                setBackground('image', url);
                closeSidebarFunc();
            }
        };
        input.click();
    });
    document.getElementById('bgColor').addEventListener('change', (e) => {
        setBackground('color', e.target.value);
        closeSidebarFunc();
    });

    // 深色模式
    let isDark = false;
    function toggleTheme() {
        isDark = !isDark;
        if (isDark) {
            body.style.background = 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)';
            body.style.backgroundSize = '400% 400%';
            body.style.animation = 'gradientShift 15s ease infinite';
            themeToggle.innerHTML = '☀️ 切换浅色模式';
        } else {
            loadBackground();
            themeToggle.innerHTML = '🌙 切换深色模式';
        }
    }
    themeToggle.addEventListener('click', toggleTheme);

    function init() {
        if (apiKey) {
            apiKeyInput.value = '已保存的密钥';
            enableChat(true);
        } else {
            enableChat(false);
        }
        loadBackground();
        renderChatFromHistory();
        renderConversationList();
    }
    init();
</script>
</body>
</html>
