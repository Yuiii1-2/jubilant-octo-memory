<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>DeepSeek Chat</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="createNewChat()">
                    <span>+</span> 新对话
                </button>
            </div>
            
            <div class="chat-list" id="chatList">
                <!-- 对话列表动态生成 -->
            </div>
            
            <div class="sidebar-footer">
                <div class="theme-selector">
                    <label>主题颜色：</label>
                    <div class="color-options">
                        <button class="color-btn" style="background: #4A90E2" onclick="changeTheme('#4A90E2')"></button>
                        <button class="color-btn" style="background: #9B59B6" onclick="changeTheme('#9B59B6')"></button>
                        <button class="color-btn" style="background: #2ECC71" onclick="changeTheme('#2ECC71')"></button>
                        <button class="color-btn" style="background: #E74C3C" onclick="changeTheme('#E74C3C')"></button>
                        <button class="color-btn" style="background: #F39C12" onclick="changeTheme('#F39C12')"></button>
                    </div>
                </div>
                <div class="api-key-section">
                    <button class="settings-btn" onclick="toggleApiSettings()">⚙️ API设置</button>
                </div>
            </div>
        </aside>
        
        <!-- 主聊天区域 -->
        <main class="main-content">
            <header class="chat-header">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <h2 id="currentChatTitle">DeepSeek Chat</h2>
                <div class="header-actions">
                    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                        📎 上传文件
                    </button>
                    <input type="file" id="fileInput" style="display: none" multiple accept="image/*,.pdf,.txt,.doc,.docx" onchange="handleFileUpload(event)">
                    <label class="web-search-toggle">
                        <input type="checkbox" id="webSearchToggle" onchange="toggleWebSearch()">
                        <span>🌐 联网搜索</span>
                    </label>
                </div>
            </header>
            
            <div class="messages-container" id="messagesContainer">
                <div class="welcome-message">
                    <h1>👋 欢迎使用 DeepSeek Chat</h1>
                    <p>开始一段新的对话吧</p>
                </div>
            </div>
            
            <div class="input-area">
                <div class="input-container">
                    <textarea 
                        id="messageInput" 
                        placeholder="输入消息..." 
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                    <button class="send-btn" onclick="sendMessage()" id="sendButton">
                        <span>发送</span>
                    </button>
                </div>
                <div class="input-footer">
                    <span class="char-count" id="charCount">0/4000</span>
                </div>
            </div>
        </main>
        
        <!-- API设置弹窗 -->
        <div class="modal" id="apiSettingsModal">
            <div class="modal-content">
                <h3>API 设置</h3>
                <div class="form-group">
                    <label>DeepSeek API Key:</label>
                    <input type="password" id="apiKeyInput" placeholder="输入你的API Key">
                </div>
                <div class="form-group">
                    <label>API Base URL:</label>
                    <input type="text" id="apiBaseUrl" value="https://api.deepseek.com/v1">
                </div>
                <div class="modal-actions">
                    <button onclick="saveApiSettings()">保存</button>
                    <button onclick="closeApiSettings()">取消</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/storage.js"></script>
    <script src="js/themes.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
